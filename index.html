// ===== RENDER =====
function render(category) {
  const grid = document.getElementById('grid');
  const filtered = category === 'all' ? items : items.filter(i => i.cat === category);
  
  grid.innerHTML = filtered.map((item, idx) => {
    const profitClass = item.margin >= 35 ? 'profit-high' : item.margin >= 25 ? 'profit-medium' : 'profit-low';
    const fillColor = item.margin >= 35 ? '#28a745' : item.margin >= 25 ? '#e67e22' : '#dc3545';
    
    return `
    <div class="card" data-cat="${item.cat}">
      <div class="img-wrap">
        <img src="${item.img}" alt="${item.name}" loading="lazy">
        <div class="badge badge-${item.cat}">${item.catCN}</div>
      </div>
      <div class="info">
        <h3>${item.name}</h3>
        
        <div class="price-row">
          <div class="mercari-price">${item.price} <span class="jpy">≈ ¥${item.priceCN}</span></div>
        </div>
        
        <div class="xianyu-row">
          <span class="xianyu-label">🧺 闲鱼参考价（点下方按钮搜）</span>
          <span class="xianyu-price">${item.xianyuCN}</span>
        </div>
        
        <div class="profit-section ${profitClass}">
          <span class="profit-label">💎 预计利润</span>
          <span class="profit-value">${item.profit}</span>
        </div>
        
        <div class="margin-bar">
          <div class="margin-fill" style="width:${item.margin}%;background:${fillColor}"></div>
        </div>
        
        <div style="font-size:11px;color:#999;margin-bottom:8px;">💡 ${item.note}</div>
        
        <div style="display:flex;gap:4px">
          <a href="${item.url}" target="_blank" class="link-btn link-mercari" style="flex:1">🇯🇵 Mercari</a>
          <a href="https://www.goofish.com/search?keyword=${encodeURIComponent(item.name.replace(/[¥0-9,円]/g,'').replace(/^\s+/,'').substring(0,50))}" target="_blank" class="link-btn link-xianyu" style="flex:1">🇨🇳 闲鱼搜</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterTab(cat, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(cat);
}
